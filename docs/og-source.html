<!doctype html>
<!--
  OG-jakokuvien lähde (og-image.png ja og-image-en.png).

  Kun tilastot muuttuvat (plugarit, skillit, agentit, säädösrekisteri):
  1. Päivitä alla olevan <script>-lohkon stats-taulukot (FI + EN).
  2. Renderöi molemmat kuvat headless-Chromella repojuuresta:

     CHROME='/Applications/Google Chrome.app/Contents/MacOS/Google Chrome'
     "$CHROME" --headless --disable-gpu --window-size=1200,630 --hide-scrollbars \
       --virtual-time-budget=8000 --screenshot=docs/og-image.png \
       "file://$PWD/docs/og-source.html"
     "$CHROME" --headless --disable-gpu --window-size=1200,630 --hide-scrollbars \
       --virtual-time-budget=8000 --screenshot=docs/og-image-en.png \
       "file://$PWD/docs/og-source.html#en"

  3. Päivitä samat luvut myös docs/index.html- ja docs/en/index.html-sivuille
     (statistiikkalohko, og:image:alt ja "Lähteet ja ylläpito" -lista).

  Fontit ladataan Google Fontsista (Inter + JetBrains Mono) — renderöinti
  vaatii verkkoyhteyden.
-->
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&family=JetBrains+Mono:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background:
      linear-gradient(135deg, rgba(200,241,105,.28), rgba(200,241,105,0) 30%) ,
      linear-gradient(315deg, rgba(200,241,105,.28), rgba(200,241,105,0) 30%),
      repeating-linear-gradient(0deg, rgba(60,80,40,.06) 0 1px, transparent 1px 40px),
      repeating-linear-gradient(90deg, rgba(60,80,40,.06) 0 1px, transparent 1px 40px),
      #f2f4ec;
    position: relative;
  }
  .sq { position: absolute; width: 22px; height: 22px; border-radius: 5px; background: #c8f169; }
  .sq1 { top: 38px; left: 38px; }
  .sq2 { top: 548px; left: 8px; }
  .sq3 { top: 8px; right: 260px; width: 16px; height: 16px; }
  .card {
    position: absolute; left: 64px; right: 64px; top: 60px; bottom: 68px;
    background: #fff; border-radius: 26px;
    box-shadow: 0 6px 0 #a9d94f, 0 22px 50px rgba(40,60,20,.14);
    padding: 54px 60px;
  }
  .head { display: flex; align-items: center; gap: 16px; }
  .gh { width: 46px; height: 46px; fill: #111; }
  .repo { font-size: 37px; font-weight: 800; letter-spacing: -.5px; color: #111; }
  .repo .owner { color: #9aa3ae; font-weight: 700; }
  .badge {
    position: absolute; top: 44px; right: 56px; width: 78px; height: 78px;
    background: #c8f169; border-radius: 20px; display: flex; align-items: center;
    justify-content: center; font-size: 44px; font-weight: 800; color: #111;
    box-shadow: 0 4px 0 #a9d94f;
  }
  .headline {
    margin-top: 62px; font-size: 46px; font-weight: 800; letter-spacing: -1px;
    line-height: 1.18; color: #111; max-width: 900px;
  }
  .hl {
    background: linear-gradient(transparent 58%, #c8f169 58%, #c8f169 96%, transparent 96%);
    padding: 0 6px; margin: 0 -6px; border-radius: 3px;
  }
  .rule { margin-top: 46px; border-top: 1.5px solid #e7eaee; }
  .stats { display: flex; gap: 76px; margin-top: 38px; }
  .stat b { display: block; font-size: 52px; font-weight: 800; letter-spacing: -1px; color: #111; }
  .stat span {
    display: block; margin-top: 8px; font-family: 'JetBrains Mono', monospace;
    font-size: 19px; font-weight: 500; letter-spacing: .8px; color: #8b95a1;
  }
</style>
</head>
<body>
  <div class="sq sq1"></div><div class="sq sq2"></div><div class="sq sq3"></div>
  <div class="card">
    <div class="head">
      <svg class="gh" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <div class="repo"><span class="owner">akunikkola/</span>claude-for-legal-finland</div>
    </div>
    <div class="badge">§</div>
    <div class="headline" id="headline"></div>
    <div class="rule"></div>
    <div class="stats" id="stats"></div>
  </div>
  <script>
    const fi = location.hash !== '#en';
    document.getElementById('headline').innerHTML = fi
      ? 'Suomalainen vastine Anthropicin<br><span class="hl">”Claude for Legal”</span> -lisäosalle.'
      : 'A Finnish counterpart to Anthropic’s<br><span class="hl">“Claude for Legal”</span>.';
    const stats = fi
      ? [['24','plugaria'],['78','skilliä'],['6','agenttia'],['105','säädöstä']]
      : [['24','plugins'],['78','skills'],['6','agents'],['105','statutes']];
    document.getElementById('stats').innerHTML =
      stats.map(([n, l]) => `<div class="stat"><b>${n}</b><span>${l}</span></div>`).join('');
  </script>
</body>
</html>
