name: Validoi plugarit

# Ajaa rakenne- ja laatuvalidaattorin jokaisessa pushissa ja pull requestissa.
# Portti estää markkinapaikan rikkovat virheet (frontmatter, marketplace-
# yhtenäisyys, kuolleet linkit, Cowork-validaattorin numero-pilkku-ansa)
# ennen kuin ne päätyvät käyttäjien asennuksiin.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Validoi rakenne ja frontmatter
        run: node scripts/validate.mjs

      - name: Tarkista että SKILLS.md on ajan tasalla
        run: |
          node scripts/generate-skills-md.mjs
          git diff --exit-code SKILLS.md || {
            echo "SKILLS.md ei ole ajan tasalla. Aja: node scripts/generate-skills-md.mjs"
            exit 1
          }

      - name: Tarkista että Codex-manifestit ovat ajan tasalla
        run: |
          node scripts/generate-codex.mjs
          git diff --exit-code -- .agents/plugins/marketplace.json '*/.codex-plugin/plugin.json' '*/.codex-plugin/mcp.json' '*/.mcp.json' '*/skills/*/agents/openai.yaml' || {
            echo "Codex-manifestit eivät ole ajan tasalla. Aja: node scripts/generate-codex.mjs"
            exit 1
          }
          untracked="$(git ls-files --others --exclude-standard -- .agents/plugins/marketplace.json '*/.codex-plugin/plugin.json' '*/.codex-plugin/mcp.json' '*/.mcp.json' '*/skills/*/agents/openai.yaml')"
          if [ -n "$untracked" ]; then
            echo "Codex-generointi loi commitista puuttuvia tiedostoja:"
            echo "$untracked"
            echo "Aja: node scripts/generate-codex.mjs ja lisää tiedostot committiin."
            exit 1
          fi

      - name: Aja Node-testit
        run: node --test tests/*.test.mjs

  portability-tests:
    name: Node-testit (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Aja Node-testit
        run: node --test tests/*.test.mjs
